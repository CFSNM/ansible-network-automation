[defaults]
inventory          = inventory/hosts.yml
roles_path         = roles
host_key_checking  = False
timeout            = 30
stdout_callback    = default
result_format      = yaml
interpreter_python = auto_silent

[persistent_connection]
connect_timeout    = 30
command_timeout    = 30

[ssh_connection]
ssh_args = -o KexAlgorithms=+diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1 -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedKeyTypes=+ssh-rsa
